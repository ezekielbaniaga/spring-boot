name: spring-boot-sample
services:
  postgres:
    image: postgres:18.3-bookworm
    container_name: postgres-spring-boot-sample
    restart: unless-stopped
    environment:
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: apppwd$1234
      POSTGRES_DB: appdb
    volumes:
      - pgdata:/var/lib/postgresql
    networks:
      - app-network

  app:
    image: spring-boot-sample:1.0
    container_name: spring-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/appdb
      SPRING_DATASOURCE_USERNAME: appuser
      SPRING_DATASOURCE_PASSWORD: apppwd$1234
    networks:
      - app-network

volumes:
  pgdata:

networks:
  app-network: